<!DOCTYPE html>
<html lang="en">
    <head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PSIDE</title>
	<script src="/uplot.min.js"></script>
	<link rel="stylesheet" href="/uplot.min.css">
	<style>
:root {
    --bg:       #060708;
    --bg2:      #1a1f27;
    --bg2-glass: rgba(26, 31, 39, 0.72);
    --bg3:      #232935;
    --bg3-glass: rgba(35, 41, 53, 0.6);
    --border:   #2c3340;
    --border2:  #3e4856;
    --text:     #c9d1dc;
    --text-dim: #7c8798;
    --text-mid: #8893a4;
    --accent:   #4af0b0;
    --accent2:  #3dd8fb;
    --warn:     #f0a44a;
    --mono:     ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'DejaVu Sans Mono', monospace;
    --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
}

/* ── Perspective floor, sits behind the floating panels ── */
#bg-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    perspective: 400px;
    perspective-origin: 50% 30%;
}
#bg-grid::before {
    content: '';
    position: absolute;
    left: -50%; right: -50%; bottom: -10%;
    height: 160%;
    background-image:
        linear-gradient(var(--border2) 1px, transparent 1px),
        linear-gradient(90deg, var(--border2) 1px, transparent 1px);
    background-size: 48px 48px;
    transform: rotateX(75deg);
    transform-origin: bottom;
    opacity: 0.4;
    mask-image: linear-gradient(to top, black, transparent 65%);
    -webkit-mask-image: linear-gradient(to top, black, transparent 65%);
    animation: gridDrift 10s linear infinite;
}
@keyframes gridDrift { from { background-position: 0 0, 0 0; } to { background-position: 0 48px, 0 0; } }

#app {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-rows: 40px 1fr;
    grid-template-columns: 260px 1fr;
    gap: 14px;
    padding: 14px;
    height: 100vh;
    overflow: hidden;
    animation: appIn 0.4s ease both;
}
@keyframes appIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }

#topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 16px;
    background: var(--bg2-glass);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 1px 0 rgba(255,255,255,.03) inset, 0 10px 24px -14px rgba(0,0,0,.65);
    flex-shrink: 0;
}

.logo {
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    text-shadow: 0 0 12px rgba(74, 240, 176, 0.35), 0 1px 0 rgba(0,0,0,.6), 0 2px 3px rgba(0,0,0,.35);
}
.logo span { color: var(--text-dim); font-weight: 300; }
.logo .cursor {
    color: var(--accent);
    margin-left: 3px;
    animation: blink 1.1s steps(1) infinite;
}
@keyframes blink { 50%, 100% { opacity: 0; } }

.sep { width: 1px; height: 18px; background: var(--border2); }

#top-meta {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 20px;
}
#top-meta b { color: var(--text-mid); font-weight: 400; }

.status {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
}
.status .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

#sidebar {
    background: var(--bg2-glass);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 1px 0 rgba(255,255,255,.03) inset, 0 14px 30px -16px rgba(0,0,0,.65);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
}

#sidebar-header {
    background: var(--bg2);
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
}
#sidebar-header .label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
}

#search {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 8px;
    outline: none;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.3);
    transition: border-color 0.15s, box-shadow 0.15s;
}
#search::placeholder { color: var(--text-dim); }
#search:focus { border-color: var(--accent); box-shadow: inset 0 1px 3px rgba(0,0,0,.3), 0 0 0 3px rgba(74, 240, 176, 0.12); }

#section-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
    min-height: 0;
}
#section-list::-webkit-scrollbar { width: 4px; }
#section-list::-webkit-scrollbar-track { background: transparent; }
#section-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.section-item {
    padding: 7px 14px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.12s, border-color 0.12s, padding-left 0.15s var(--ease-bounce), transform 0.1s var(--ease-bounce);
    display: flex;
    flex-direction: column;
    gap: 2px;
    opacity: 0;
    transform: translateX(-4px);
    animation: itemIn 0.2s ease forwards;
}
@keyframes itemIn { to { opacity: 1; transform: none; } }
.section-item:hover  { background: var(--bg3-glass); border-left-color: var(--border2); padding-left: 17px; }
.section-item.active { background: var(--bg3-glass); border-left-color: var(--accent); }
.section-item:active { transform: scale(0.98); }

.section-item .name {
    color: var(--text);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.section-item.active .name { color: var(--accent); }

.section-item .stats { display: flex; gap: 8px; font-size: 10px; color: var(--text-dim); }
.section-item .stats .pill {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0 4px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04), inset 0 -1px 1px rgba(0,0,0,.35);
}

#main {
    /* translucent: the collapsed-card list has a lot of open space, let the
       floor grid show through it instead of painting it over flatly */
    background: var(--bg2-glass);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 1px 0 rgba(255,255,255,.03) inset, 0 14px 30px -16px rgba(0,0,0,.65);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
    position: relative;
}

#section-header {
    background: var(--bg2);
    padding: 11px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: baseline;
    gap: 14px;
}
#section-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
#section-title.placeholder { color: var(--text-dim); font-weight: 300; font-size: 13px; }
#section-summary { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
#section-summary b { color: var(--text-mid); font-weight: 400; }

#empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
    font-size: 12px;
}
#empty-state .big {
    font-size: 42px;
    opacity: .14;
    letter-spacing: .25em;
    text-shadow: 0 6px 16px rgba(0,0,0,.5);
    animation: breathe 3.6s ease-in-out infinite;
}
@keyframes breathe { 50% { opacity: .22; transform: scale(1.06); } }
#empty-state.hidden { display: none; }

#charts-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
}
#charts-scroll::-webkit-scrollbar { width: 6px; }
#charts-scroll::-webkit-scrollbar-track { background: transparent; }
#charts-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.ip-card {
    --rx: 0deg;
    --ry: 0deg;
    background: var(--bg2-glass);
    backdrop-filter: blur(14px) saturate(160%);
    -webkit-backdrop-filter: blur(14px) saturate(160%);
    border: 1px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
    opacity: 0;
    position: relative;
    transform: translateY(6px) perspective(2200px) rotateX(var(--rx)) rotateY(var(--ry));
    transform-style: preserve-3d;
    animation: cardIn 0.2s ease forwards;
    flex-shrink: 0;
    transition: border-color 0.15s, box-shadow 0.2s;
}
.ip-card.tilt-settle { transition: border-color 0.15s, box-shadow 0.2s, transform 0.4s var(--ease-bounce); }
.ip-card:hover { border-color: var(--border2); box-shadow: 0 20px 40px -18px rgba(0, 0, 0, 0.6); }
@keyframes cardIn { to { opacity:1; transform: perspective(2200px) rotateX(var(--rx)) rotateY(var(--ry)); } }

/* mouse-tracked glare sheen, follows --mx/--my set by the tilt handler */
.ip-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,.08), transparent 60%);
    opacity: 0;
    transition: opacity .25s;
    pointer-events: none;
    z-index: 2;
}
.ip-card:hover::after { opacity: 1; }
.ip-card.expanded::after { display: none; }

.ip-card-header {
    padding: 9px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    transition: background 0.12s;
}
.ip-card-header:hover { background: var(--bg3-glass); }
.ip-card-header:active { transform: scale(0.997); }
.ip-card.expanded .ip-card-header {
    border-bottom: 1px solid var(--border);
    background: var(--bg3-glass);
}

.loc-ip {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .04em;
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.ip-pills { display: flex; gap: 8px; font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
.ip-pills .pill {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0 5px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04), inset 0 -1px 1px rgba(0,0,0,.35);
}
.ip-pills .pill.warn { border-color: var(--warn); color: var(--warn); }

.ip-expand-icon {
    font-size: 10px;
    color: var(--text-dim);
    transition: transform 0.3s var(--ease-bounce), color 0.15s;
    flex-shrink: 0;
}
.ip-card-header:hover .ip-expand-icon { color: var(--text-mid); }
.ip-card.expanded .ip-expand-icon { transform: rotate(90deg); color: var(--accent); }

.ip-chart-body {
    display: grid;
    grid-template-rows: 0fr;
    perspective: 600px;
    transition: grid-template-rows 0.3s var(--ease-bounce);
}
.ip-card.expanded .ip-chart-body { grid-template-rows: 1fr; }
.ip-chart-body-inner {
    overflow: hidden;
    min-height: 0;
    padding: 0 8px;
    opacity: 0;
    transform: rotateX(-20deg);
    transform-origin: top center;
    transition: transform 0.35s var(--ease-bounce), opacity 0.25s ease, padding 0.3s var(--ease-bounce);
}
.ip-card.expanded .ip-chart-body-inner { padding: 8px 8px 4px; opacity: 1; transform: rotateX(0deg); }

.u-legend { display: none !important; }
.u-wrap   { background: transparent !important; }
.u-over   { cursor: crosshair; }

.chart-legend {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 5px 8px 2px;
    margin-top: 4px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-dim);
    flex-wrap: wrap;
}
.chart-legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
}
.chart-legend-item svg { flex-shrink: 0; display: block; }

.spinner {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), var(--accent2), transparent 65%);
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));
    mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));
    animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Click sparks ── */
.spark {
    position: fixed;
    width: 4px; height: 4px;
    border-radius: 1px;
    pointer-events: none;
    z-index: 9999;
    animation: sparkFly 0.5s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
}
@keyframes sparkFly {
    to { transform: translate(var(--dx), var(--dy)) rotate(var(--spin)) scale(0.2); opacity: 0; }
}

@media (prefers-reduced-motion: reduce) {
    #app, .section-item, .ip-card, #empty-state .big, .logo .cursor, .status .dot, #bg-grid::before {
        animation: none !important;
    }
    .section-item, .ip-card { opacity: 1; transform: none; }
    .ip-card::after { display: none !important; }
    .ip-chart-body-inner { transform: none !important; }
}

/* Without backdrop-filter (unsupported, or disabled e.g. in hardened Firefox
   profiles) the glass panels would just look like flat, unblurred, half-see-
   through boxes over the grid. Go solid instead — closer to the original
   opaque-panel look than a broken glass effect. */
@supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    #topbar, #sidebar, #main, .ip-card { background: var(--bg2); }
    .section-item:hover, .section-item.active,
    .ip-card-header:hover, .ip-card.expanded .ip-card-header { background: var(--bg3); }
}
	</style>
    </head>
    <body>
	<div id="bg-grid"></div>
	<div id="app">

	    <header id="topbar">
		<div class="logo">p<span>side</span><span class="cursor">_</span></div>
		<div class="sep"></div>
		<div id="top-meta">
		    <span><b id="meta-binary">—</b> binary</span>
		    <span><b id="meta-sections">—</b> sections</span>
		</div>
		<div class="status"><div class="dot"></div>local</div>
	    </header>

	    <nav id="sidebar">
		<div id="sidebar-header">
		    <div class="label">Sections</div>
		    <input id="search" type="text" placeholder="filter…" autocomplete="off" spellcheck="false">
		</div>
		<div id="section-list"></div>
	    </nav>

	    <main id="main">
		<div id="section-header">
		    <div id="section-title" class="placeholder">select a section</div>
		    <div id="section-summary"></div>
		</div>

		<div id="empty-state">
		    <div class="big">∅</div>
		    <span id="empty-msg">no section selected</span>
		</div>

		<div id="charts-scroll" style="display:none"></div>
	    </main>

	</div>
	<script>
	    const PALETTE = [
		'#4af0b0','#3dd8fb','#f0a44a','#a78bfa',
		'#f05a5a','#facc15','#34d399','#f472b6',
		'#60a5fa','#fb923c',
	    ];

	    const reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

	    const chartHeight = (w) => w ? Math.max(160, Math.round(w / 3)) : Math.max(200, Math.round(window.innerWidth * 0.22));

	    let sections  = [];
	    let activeVma = null;
	    let allSeries = [];
	    const cardState = new Map();

	    function spawnSparks(x, y, color, count) {
		if (reducedMotion) return;
		for (let i = 0; i < count; i++) {
		    const s = document.createElement('span');
		    s.className = 'spark';
		    s.style.background = color;
		    s.style.left = x + 'px';
		    s.style.top = y + 'px';
		    const angle = Math.random() * Math.PI * 2;
		    const dist = 14 + Math.random() * 26;
		    s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
		    s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
		    s.style.setProperty('--spin', Math.floor(Math.random() * 360) + 'deg');
		    document.body.appendChild(s);
		    s.addEventListener('animationend', () => s.remove());
		}
	    }

	    (async () => {
		try {
		    sections = await (await fetch('/api/vmas')).json();
		    document.getElementById('meta-sections').textContent = sections.length;
		    renderSidebar(sections);
		    if (sections.length === 1) loadSection(sections[0].name);
		} catch {
		    showEmpty('failed to load sections');
		}
	    })();

	    function renderSidebar(items) {
		const list = document.getElementById('section-list');
		list.innerHTML = '';
		if (!items.length) {
		    list.innerHTML = '<div style="padding:16px 14px;color:var(--text-dim);font-size:11px">no sections found</div>';
		    return;
		}
		items.forEach((s, i) => {
		    const el = document.createElement('div');
		    el.className = 'section-item' + (s.name === activeVma ? ' active' : '');
		    el.dataset.vma = s.name;
		    el.style.animationDelay = Math.min(i * 20, 300) + 'ms';
		    el.innerHTML = `
		      <div class="name" title="${esc(s.name)}">${esc(s.name)}</div>
		      <div class="stats">
			<span class="pill">${s.graph_count} graphs</span>
		      </div>`;
		    el.addEventListener('click', (e) => {
			spawnSparks(e.clientX, e.clientY, 'var(--accent)', 5);
			loadSection(s.name);
		    });
		    list.appendChild(el);
		});
	    }

	    document.getElementById('search').addEventListener('input', e => {
		const q = e.target.value.toLowerCase();
		renderSidebar(sections.filter(s => s.name.toLowerCase().includes(q)));
	    });

	    async function loadSection(vma) {
		if (vma === activeVma) return;
		activeVma = vma;

		document.querySelectorAll('.section-item').forEach(el =>
		    el.classList.toggle('active', el.dataset.vma === vma));

		const titleEl = document.getElementById('section-title');
		titleEl.textContent = vma;
		titleEl.classList.remove('placeholder');
		document.getElementById('section-summary').innerHTML = '';

		cardState.forEach(s => s.plot?.destroy());
		cardState.clear();
		allSeries = [];

		showEmpty(null, true);

		try {
		    const data = await (await fetch('/api/vma?name=' + encodeURIComponent(vma))).json();
		    renderSection(data);
		} catch {
		    showEmpty('failed to load section data');
		}
	    }

	    function renderSection(data) {
		const scroll = document.getElementById('charts-scroll');
		scroll.innerHTML = '';
		cardState.forEach(s => s.plot?.destroy());
		cardState.clear();

		allSeries = data.filter(s => s.points.length > 0);

		applyFilter();
	    }

	    const AUTO_EXPAND_COUNT = 3;

	    function applyFilter() {
		const visible = allSeries;

		const scroll = document.getElementById('charts-scroll');
		scroll.innerHTML = '';
		cardState.forEach(s => s.plot?.destroy());
		cardState.clear();

		document.getElementById('section-summary').innerHTML =
		    `<b>${visible.length}</b> location${visible.length !== 1 ? 's' : ''}`;

		if (visible.length === 0) {
		    showEmpty('no locations');
		    return;
		}

		document.getElementById('empty-state').classList.add('hidden');
		scroll.style.display = 'flex';

		visible.forEach((series, i) => {
		    const color = PALETTE[i % PALETTE.length];
		    const card = buildCard(series, color, i);
		    scroll.appendChild(card);
		    if (i < AUTO_EXPAND_COUNT) expandCard(card);
		});
	    }

	    const MAX_TILT = 4; // degrees

	    function resetTilt(card) {
		card.classList.add('tilt-settle');
		card.style.setProperty('--rx', '0deg');
		card.style.setProperty('--ry', '0deg');
		setTimeout(() => card.classList.remove('tilt-settle'), 400);
	    }

	    function expandCard(card) {
		if (card.classList.contains('expanded')) return;
		card.classList.add('expanded');
		resetTilt(card); // flatten so the chart stays legible/interactive while open

		const state = cardState.get(card);
		const chartEl = card.querySelector('.ip-chart');
		const chartBodyInner = card.querySelector('.ip-chart-body-inner');

		if (!state.plot) state.plot = buildPlot(chartEl, state.series, state.color);
		requestAnimationFrame(() => {
		    const w = chartBodyInner.clientWidth - 16;
		    if (w > 0) state.plot.setSize({ width: w, height: chartHeight(w) });
		});
	    }

	    function collapseCard(card) {
		card.classList.remove('expanded');
	    }

	    function buildLocationEl(loc, color) {
		const el = document.createElement('span');
		el.className = 'loc-ip';
		el.style.color = color;
		el.textContent = loc;
		return el;
	    }

	    function buildCard(series, color, idx) {
		const singletons = series.points.filter(p => p.singleton).length;

		const card = document.createElement('div');
		card.className = 'ip-card';
		card.style.animationDelay = Math.min(idx * 30, 300) + 'ms';

		if (!reducedMotion) {
		    card.addEventListener('mousemove', (e) => {
			if (card.classList.contains('expanded')) return;
			const rect = card.getBoundingClientRect();
			const px = (e.clientX - rect.left) / rect.width;
			const py = (e.clientY - rect.top) / rect.height;
			card.style.setProperty('--ry', ((px - 0.5) * MAX_TILT * 2).toFixed(2) + 'deg');
			card.style.setProperty('--rx', ((0.5 - py) * MAX_TILT * 2).toFixed(2) + 'deg');
			card.style.setProperty('--mx', (px * 100).toFixed(1) + '%');
			card.style.setProperty('--my', (py * 100).toFixed(1) + '%');
		    });
		    card.addEventListener('mouseleave', () => resetTilt(card));
		}

		const header = document.createElement('div');
		header.className = 'ip-card-header';
		header.title = series.location;

		header.appendChild(buildLocationEl(series.location, color));

		const pills = document.createElement('div');
		pills.className = 'ip-pills';
		pills.innerHTML = (singletons ? `<span class="pill warn">⚠ ${singletons} singleton${singletons > 1 ? 's' : ''}</span>` : '');
		header.appendChild(pills);

		const expandIcon = document.createElement('span');
		expandIcon.className = 'ip-expand-icon';
		expandIcon.textContent = '▶';
		header.appendChild(expandIcon);

		const chartBody = document.createElement('div');
		chartBody.className = 'ip-chart-body';
		const chartBodyInner = document.createElement('div');
		chartBodyInner.className = 'ip-chart-body-inner';

		const legend = document.createElement('div');
		legend.className = 'chart-legend';
		legend.innerHTML =
		    `<span class="chart-legend-item">` +
		    `<svg width="24" height="10"><line x1="0" y1="5" x2="24" y2="5" stroke="${color}" stroke-width="2"/></svg>` +
		    `75th percentile</span>` +
		    `<span class="chart-legend-item">` +
		    `<svg width="20" height="10"><rect x="0" y="1" width="20" height="8" rx="1" fill="${color}" fill-opacity="0.22"/><line x1="0" y1="1" x2="20" y2="1" stroke="${color}" stroke-opacity="0.55" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="9" x2="20" y2="9" stroke="${color}" stroke-opacity="0.55" stroke-width="1" stroke-dasharray="3,3"/></svg>` +
		    `95% confidence interval</span>` +
		    `<span class="chart-legend-item">` +
		    `<svg width="12" height="12"><polygon points="6,1 11,11 1,11" fill="${color}" fill-opacity="0.9"/></svg>` +
		    `singleton <span style="color:var(--text-mid);margin-left:2px">(single datapoint — low confidence)</span></span>`;
		const chartEl = document.createElement('div');
		chartEl.className = 'ip-chart';
		chartBodyInner.appendChild(chartEl);
		chartBodyInner.appendChild(legend);
		chartBody.appendChild(chartBodyInner);

		card.appendChild(header);
		card.appendChild(chartBody);

		cardState.set(card, { plot: null, series, color });

		header.addEventListener('click', (e) => {
		    const willExpand = !card.classList.contains('expanded');
		    spawnSparks(e.clientX, e.clientY, color, willExpand ? 6 : 3);
		    if (willExpand) expandCard(card); else collapseCard(card);
		});

		return card;
	    }

	    function buildPlot(chartEl, series, color) {
		const present = series.points.map((p, i) => ({ ...p, x: i })).filter(p => p.present);
		const xVals   = present.map(p => p.x);
		const percents = present.map(p => p.percent);
		const ciLow   = present.map(p => p.ci_low);
		const ciHigh  = present.map(p => p.ci_high);

		const rv = parseInt(color.slice(1,3),16);
		const gv = parseInt(color.slice(3,5),16);
		const bv = parseInt(color.slice(5,7),16);

		const opts = {
		    width:  800,
		    height: chartHeight(800),
		    legend: { show: false },
		    cursor: { show: true, points: { show: false } },
		    scales: {
			x: { time: false },
			y: { range: (u, mn, mx) => [0, Math.max(mx + 10, 200)] },
		    },
		    series: [
			{},
			{ stroke: color, width: 2, paths: uPlot.paths.spline(), points: { show: false } },
			{ show: false, points: { show: false } },
			{ show: false, points: { show: false } },
		    ],
		    hooks: {
			drawClear: [u => {
			    const { ctx, bbox: { left, top, width, height } } = u;
			    const y100 = u.valToPos(100, 'y', true);

			    const gradUp = ctx.createLinearGradient(0, y100, 0, top);
			    gradUp.addColorStop(0,   'rgba(74, 240, 176, 0)');
			    gradUp.addColorStop(0.5, 'rgba(74, 240, 176, 0.04)');
			    gradUp.addColorStop(1,   'rgba(74, 240, 176, 0.09)');
			    ctx.fillStyle = gradUp;
			    ctx.fillRect(left, top, width, y100 - top);

			    const gradDown = ctx.createLinearGradient(0, y100, 0, top + height);
			    gradDown.addColorStop(0,    'rgba(240, 75, 75, 0)');
			    gradDown.addColorStop(0.45, 'rgba(240, 75, 75, 0.05)');
			    gradDown.addColorStop(1,    'rgba(240, 75, 75, 0.11)');
			    ctx.fillStyle = gradDown;
			    ctx.fillRect(left, y100, width, (top + height) - y100);

			    ctx.save();
			    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
			    ctx.lineWidth = 1.5;
			    ctx.setLineDash([6, 4]);
			    ctx.beginPath();
			    ctx.moveTo(left, y100);
			    ctx.lineTo(left + width, y100);
			    ctx.stroke();
			    ctx.setLineDash([]);
			    ctx.restore();
			}],
			draw: [u => {
			    const { ctx, bbox: { left, top, width, height } } = u;
			    ctx.save();
			    ctx.beginPath(); ctx.rect(left, top, width, height); ctx.clip();

			    const hiPts = xVals.map((x, i) => ({ x: u.valToPos(x,'x',true), y: u.valToPos(ciHigh[i],'y',true) }));
			    const loPts = xVals.map((x, i) => ({ x: u.valToPos(x,'x',true), y: u.valToPos(ciLow[i], 'y',true) }));

			    ctx.fillStyle = `rgba(${rv},${gv},${bv},0.18)`;
			    ctx.beginPath();
			    drawSpline(ctx, hiPts, false);
			    drawSpline(ctx, loPts, true);
			    ctx.closePath();
			    ctx.fill();

			    ctx.strokeStyle = `rgba(${rv},${gv},${bv},0.50)`;
			    ctx.lineWidth = 1;
			    ctx.setLineDash([3,4]);
			    [hiPts, loPts].forEach(pts => {
				ctx.beginPath();
				ctx.moveTo(pts[0].x, pts[0].y);
				drawSpline(ctx, pts, false);
				ctx.stroke();
			    });
			    ctx.setLineDash([]);

			    ctx.fillStyle = `rgba(${rv},${gv},${bv},0.9)`;
			    series.points.forEach((p, i) => {
				if (!p.singleton) return;
				const x = u.valToPos(i,'x',true);
				const y = u.valToPos(p.percent, 'y',true);
				ctx.beginPath();
				ctx.moveTo(x, y-7); ctx.lineTo(x-5, y+4); ctx.lineTo(x+5, y+4);
				ctx.closePath(); ctx.fill();
			    });

			    ctx.restore();
			}],
		    },
		    axes: [
			{
			    font: '11px monospace', stroke: '#7c8798',
			    grid: { stroke: '#2a3040', width: 1 },
			    ticks: { stroke: '#252a33', width: 1 },
			    label: 'speedup %',
			    labelFont: '10px monospace',
			    splits: (u, ax, scMin, scMax) => {
				const major = [];
				for (let i = 0; i <= 20; i += 2) major.push(i);
				return major;
			    },
			    values: (u, splits) => splits.map(v => v == null ? '' : (v * 5).toFixed(0) + '%'),
			},
			{
			    font: '11px monospace', stroke: '#7c8798',
			    grid: { stroke: '#2a3040', width: 1 }, ticks: { stroke: '#252a33', width: 1 },
			    label: 'throughput %', labelFont: '10px monospace',
			    splits: (u, ax, scMin, scMax) => {
				const major = [0, 25, 50, 75, 100, 125, 150, 175, 200];
				return major.filter(v => v >= scMin - 1 && v <= scMax + 1);
			    },
			    values: (u, splits) => splits.map(v => v == null ? '' : v.toFixed(0) + '%'),
			},
		    ],
		};

		return new uPlot(opts, [xVals, percents, ciLow, ciHigh], chartEl);
	    }

	    function drawSpline(ctx, points, reverse) {
		const pts = reverse ? [...points].reverse() : points;
		ctx.lineTo(pts[0].x, pts[0].y);
		for (let i = 0; i < pts.length - 1; i++) {
		    const p0 = pts[Math.max(i-1,0)], p1 = pts[i],
			p2 = pts[i+1],             p3 = pts[Math.min(i+2,pts.length-1)];
		    for (let t = .1; t <= 1; t += .1) {
			const t2=t*t, t3=t2*t;
			ctx.lineTo(
			    .5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
			    .5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
			);
		    }
		}
	    }

	    function showEmpty(msg, loading = false) {
		const emptyEl  = document.getElementById('empty-state');
		const scrollEl = document.getElementById('charts-scroll');
		scrollEl.style.display = 'none';
		emptyEl.classList.remove('hidden');
		emptyEl.querySelector('.big').style.display = loading ? 'none' : '';
		const msgEl = document.getElementById('empty-msg');
		if (loading) {
		    msgEl.innerHTML = `<div class="spinner"></div>`;
		} else {
		    msgEl.textContent = msg ?? 'no section selected';
		}
	    }

	    window.addEventListener('resize', () => {
		cardState.forEach((state, card) => {
		    if (!state.plot || !card.classList.contains('expanded')) return;
		    const body = card.querySelector('.ip-chart-body-inner');
		    const w = body.clientWidth - 16;
		    if (w > 0) state.plot.setSize({ width: w, height: chartHeight(w) });
		});
	    });

	    function esc(s) {
		return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
	    }
	</script>
    </body>
