<!DOCTYPE html>
<html lang="en">
    <head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PSIDE</title>
	<script src="/uplot.min.js"></script>
	<link rel="stylesheet" href="/uplot.min.css">
	<style>
:root {
    --bg:       #0d0f12;
    --bg2:      #13161b;
    --bg3:      #1a1e25;
    --border:   #252a33;
    --border2:  #2e3540;
    --text:     #c9d1dc;
    --text-dim: #5a6474;
    --text-mid: #8893a4;
    --accent:   #4af0b0;
    --accent2:  #3dd8fb;
    --warn:     #f0a44a;
    --mono:     ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'DejaVu Sans Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
}

#app {
    display: grid;
    grid-template-rows: 40px 1fr;
    grid-template-columns: 260px 1fr;
    height: 100vh;
    overflow: hidden;
}

/* ── Topbar ── */
#topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}

.logo {
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
}
.logo span { color: var(--text-dim); font-weight: 300; }

.sep { width: 1px; height: 18px; background: var(--border2); }

#top-meta {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 20px;
}
#top-meta b { color: var(--text-mid); font-weight: 400; }

.status {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
}
.status .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

/* ── Sidebar ── */
#sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
}

#sidebar-header {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
}
#sidebar-header .label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
}

#search {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 8px;
    outline: none;
    transition: border-color 0.15s;
}
#search::placeholder { color: var(--text-dim); }
#search:focus { border-color: var(--accent); }

#section-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
    min-height: 0;
}
#section-list::-webkit-scrollbar { width: 4px; }
#section-list::-webkit-scrollbar-track { background: transparent; }
#section-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.section-item {
    padding: 7px 14px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.1s, border-color 0.1s;
    display: flex;
    flex-direction: column;
    gap: 2px;
}
.section-item:hover  { background: var(--bg3); border-left-color: var(--border2); }
.section-item.active { background: var(--bg3); border-left-color: var(--accent); }

.section-item .name {
    color: var(--text);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.section-item.active .name { color: var(--accent); }

.section-item .stats { display: flex; gap: 8px; font-size: 10px; color: var(--text-dim); }
.section-item .stats .pill {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0 4px;
}

/* ── Main ── */
#main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
}

#section-header {
    padding: 11px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: baseline;
    gap: 14px;
}
#section-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
#section-title.placeholder { color: var(--text-dim); font-weight: 300; font-size: 13px; }
#section-summary { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
#section-summary b { color: var(--text-mid); font-weight: 400; }

/* ── Empty / loading ── */
#empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-dim);
    font-size: 12px;
}
#empty-state .big { font-size: 36px; opacity: .12; letter-spacing: .25em; }
#empty-state.hidden { display: none; }

/* ── Filter bar ── */
#filter-bar {
    padding: 8px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    color: var(--text-dim);
}
#filter-bar.hidden { display: none; }

#filter-bar label { white-space: nowrap; }
#filter-bar b { color: var(--text-mid); font-weight: 400; min-width: 2ch; display: inline-block; }

#min-points-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    border-radius: 2px;
    background: var(--border2);
    outline: none;
    cursor: pointer;
}
#min-points-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 4px var(--accent);
    cursor: pointer;
}
#min-points-slider::-moz-range-thumb {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    box-shadow: 0 0 4px var(--accent);
    cursor: pointer;
}

#filter-count { color: var(--text-dim); white-space: nowrap; }
#filter-count b { color: var(--text-mid); font-weight: 400; }

/* ── Chart scroll area ── */
#charts-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 0;
}
#charts-scroll::-webkit-scrollbar { width: 6px; }
#charts-scroll::-webkit-scrollbar-track { background: transparent; }
#charts-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── IP card ── */
.ip-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(6px);
    animation: cardIn 0.18s ease forwards;
    flex-shrink: 0;
}
@keyframes cardIn { to { opacity:1; transform:none; } }

.ip-card-header {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
}
.ip-card-header:hover { background: var(--bg3); }
.ip-card.expanded .ip-card-header {
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
}

.ip-addr {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .04em;
    flex: 1;
}
.ip-pills { display: flex; gap: 8px; font-size: 10px; color: var(--text-dim); }
.ip-pills .pill {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0 5px;
}
.ip-pills .pill.warn { border-color: var(--warn); color: var(--warn); }

.ip-expand-icon {
    font-size: 10px;
    color: var(--text-dim);
    transition: transform 0.15s;
    flex-shrink: 0;
}
.ip-card.expanded .ip-expand-icon { transform: rotate(90deg); }

/* chart body — hidden by default, expands on click */
.ip-chart-body {
    display: none;
    padding: 8px 8px 4px;
}
.ip-card.expanded .ip-chart-body { display: block; }

/* uPlot */
.u-legend { display: none !important; }
.u-wrap   { background: transparent !important; }
.u-over   { cursor: crosshair; }

/* spinner */
.spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
	</style>
    </head>
    <body>
	<div id="app">

	    <header id="topbar">
		<div class="logo">p<span>side</span></div>
		<div class="sep"></div>
		<div id="top-meta">
		    <span><b id="meta-binary">—</b> binary</span>
		    <span><b id="meta-sections">—</b> sections</span>
		</div>
		<div class="status"><div class="dot"></div>local</div>
	    </header>

	    <nav id="sidebar">
		<div id="sidebar-header">
		    <div class="label">Sections</div>
		    <input id="search" type="text" placeholder="filter…" autocomplete="off" spellcheck="false">
		</div>
		<div id="section-list"></div>
	    </nav>

	    <main id="main">
		<div id="section-header">
		    <div id="section-title" class="placeholder">select a section</div>
		    <div id="section-summary"></div>
		</div>

		<div id="filter-bar" class="hidden">
		    <label>min points &nbsp;<b id="min-points-val">1</b></label>
		    <input id="min-points-slider" type="range" min="1" max="21" value="1" step="1">
		    <span id="filter-count"></span>
		</div>

		<div id="empty-state">
		    <div class="big">∅</div>
		    <span id="empty-msg">no section selected</span>
		</div>

		<div id="charts-scroll" style="display:none"></div>
	    </main>

	</div>
	<script>
	    const PALETTE = [
		'#4af0b0','#3dd8fb','#f0a44a','#a78bfa',
		'#f05a5a','#facc15','#34d399','#f472b6',
		'#60a5fa','#fb923c',
	    ];

	    const CHART_H = 220;

	    let sections  = [];
	    let activeVma = null;
	    let allSeries = [];
	    const cardState = new Map();

	    // ── Boot ──────────────────────────────────────────────────────────────────────
	    (async () => {
		try {
		    sections = await (await fetch('/api/sections')).json();
		    document.getElementById('meta-sections').textContent = sections.length;
		    if (sections[0]?.binary_path) {
			const parts = sections[0].binary_path.split('/');
			document.getElementById('meta-binary').textContent = parts[parts.length - 1];
		    }
		    renderSidebar(sections);
		} catch {
		    showEmpty('failed to load sections');
		}
	    })();

	    // ── Sidebar ───────────────────────────────────────────────────────────────────
	    function renderSidebar(items) {
		const list = document.getElementById('section-list');
		list.innerHTML = '';
		if (!items.length) {
		    list.innerHTML = '<div style="padding:16px 14px;color:var(--text-dim);font-size:11px">no sections found</div>';
		    return;
		}
		items.forEach(s => {
		    const el = document.createElement('div');
		    el.className = 'section-item' + (s.vma === activeVma ? ' active' : '');
		    el.dataset.vma = s.vma;
		    el.innerHTML = `
		      <div class="name" title="${esc(s.vma)}">${esc(s.vma)}</div>
		      <div class="stats">
			<span class="pill">${s.sample_count} samples</span>
			<span class="pill">${s.ip_count} IPs</span>
		      </div>`;
		    el.addEventListener('click', () => loadSection(s.vma));
		    list.appendChild(el);
		});
	    }

	    document.getElementById('search').addEventListener('input', e => {
		const q = e.target.value.toLowerCase();
		renderSidebar(sections.filter(s => s.vma.toLowerCase().includes(q)));
	    });

	    // ── Load section ──────────────────────────────────────────────────────────────
	    async function loadSection(vma) {
		if (vma === activeVma) return;
		activeVma = vma;

		document.querySelectorAll('.section-item').forEach(el =>
		    el.classList.toggle('active', el.dataset.vma === vma));

		const titleEl = document.getElementById('section-title');
		titleEl.textContent = vma;
		titleEl.classList.remove('placeholder');
		document.getElementById('section-summary').innerHTML = '';

		// destroy old plots
		cardState.forEach(s => s.plot?.destroy());
		cardState.clear();
		allSeries = [];
		document.getElementById('filter-bar').classList.add('hidden');

		showEmpty(null, true);

		try {
		    const data = await (await fetch('/api/section?vma=' + encodeURIComponent(vma))).json();
		    renderSection(data);
		} catch {
		    showEmpty('failed to load section data');
		}
	    }

	    // ── Render section ────────────────────────────────────────────────────────────

	    function renderSection(data) {
		const scroll = document.getElementById('charts-scroll');
		scroll.innerHTML = '';
		cardState.forEach(s => s.plot?.destroy());
		cardState.clear();

		// filter out IPs with 0 points
		allSeries = data.series.filter(s => s.points.length > 0);

		const maxPoints = allSeries.reduce((m, s) => Math.max(m, s.points.length), 1);
		const slider = document.getElementById('min-points-slider');
		slider.max = maxPoints;
		slider.value = 1;
		document.getElementById('min-points-val').textContent = 1;

		const filterBar = document.getElementById('filter-bar');
		filterBar.classList.toggle('hidden', allSeries.length === 0);

		document.getElementById('empty-state').classList.add('hidden');
		scroll.style.display = 'flex';

		applyFilter();
	    }

	    function applyFilter() {
		const minPts = parseInt(document.getElementById('min-points-slider').value, 10);
		const visible = allSeries.filter(s => s.points.length >= minPts);

		const scroll = document.getElementById('charts-scroll');
		scroll.innerHTML = '';
		cardState.forEach(s => s.plot?.destroy());
		cardState.clear();

		document.getElementById('section-summary').innerHTML =
		    `<b>${visible.length}</b> IP${visible.length !== 1 ? 's' : ''} &nbsp;·&nbsp; ` +
		    `<b>${visible[0]?.points.length ?? 0}</b> speedup steps`;

		document.getElementById('filter-count').innerHTML =
		    `<b>${visible.length}</b> / ${allSeries.length} IPs`;

		if (visible.length === 0) {
		    showEmpty('no IPs match filter');
		    return;
		}

		document.getElementById('empty-state').classList.add('hidden');
		scroll.style.display = 'flex';

		visible.forEach((series, i) => {
		    const color = PALETTE[i % PALETTE.length];
		    scroll.appendChild(buildCard(series, color, i));
		});
	    }

	    document.getElementById('min-points-slider').addEventListener('input', e => {
		document.getElementById('min-points-val').textContent = e.target.value;
		applyFilter();
	    });

	    // ── One card per IP, chart built lazily on first expand ───────────────────────
	    function buildCard(series, color, idx) {
		const singletons = series.points.filter(p => p.singleton).length;

		const card = document.createElement('div');
		card.className = 'ip-card';
		card.style.animationDelay = (idx * 30) + 'ms';
		card.innerHTML = `
	      <div class="ip-card-header">
		<span class="ip-addr" style="color:${color}">
		  0x${BigInt(series.ip).toString(16).padStart(16, '0')}
		</span>
		<div class="ip-pills">
		  <span class="pill">${series.points.length} steps</span>
		  ${singletons ? `<span class="pill warn">⚠ ${singletons} singleton${singletons > 1 ? 's' : ''}</span>` : ''}
		</div>
		<span class="ip-expand-icon">▶</span>
	      </div>
	      <div class="ip-chart-body"><div class="ip-chart"></div></div>`;

		const header   = card.querySelector('.ip-card-header');
		const chartEl  = card.querySelector('.ip-chart');
		const chartBody = card.querySelector('.ip-chart-body');

		cardState.set(card, { plot: null, series, color });

		header.addEventListener('click', () => {
		    const isExpanded = card.classList.toggle('expanded');

		    if (isExpanded) {
			const state = cardState.get(card);
			if (!state.plot) {
			    // first open: build the plot now that the container is visible
			    state.plot = buildPlot(chartEl, state.series, state.color);
			    // size it correctly on next frame once layout is done
			    requestAnimationFrame(() => {
				const w = chartBody.clientWidth - 16;
				if (w > 0) state.plot.setSize({ width: w, height: CHART_H });
			    });
			}
		    }
		});

		return card;
	    }

	    // ── Build uPlot inside a container ────────────────────────────────────────────
	    function buildPlot(chartEl, series, color) {
		const xVals   = series.points.map(p => p.speedup);
		const medians = series.points.map(p => p.median);
		const ciLow   = series.points.map(p => p.ci_low);
		const ciHigh  = series.points.map(p => p.ci_high);

		const rv = parseInt(color.slice(1,3),16);
		const gv = parseInt(color.slice(3,5),16);
		const bv = parseInt(color.slice(5,7),16);

		const opts = {
		    width:  800,
		    height: CHART_H,
		    legend: { show: false },
		    cursor: { show: true, points: { show: false } },
		    scales: {
			x: { time: false },
			y: { range: (u, mn, mx) => [Math.min(mn - 5, 0), Math.max(mx + 10, 110)] },
		    },
		    series: [
			{},
			{ stroke: color, width: 2, paths: uPlot.paths.spline(), points: { show: false } },
			{ show: false, points: { show: false } },
			{ show: false, points: { show: false } },
		    ],
		    hooks: {
			drawClear: [u => {
			    const { ctx, bbox: { left, top, width } } = u;
			    const y100 = u.valToPos(100, 'y', true);
			    ctx.save();
			    ctx.setLineDash([4,4]);
			    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
			    ctx.lineWidth = 1;
			    ctx.beginPath();
			    ctx.moveTo(left, y100);
			    ctx.lineTo(left + width, y100);
			    ctx.stroke();
			    ctx.setLineDash([]);
			    ctx.restore();
			}],
			draw: [u => {
			    const { ctx, bbox: { left, top, width, height } } = u;
			    ctx.save();
			    ctx.beginPath(); ctx.rect(left, top, width, height); ctx.clip();

			    const hiPts = xVals.map((x, i) => ({ x: u.valToPos(x,'x',true), y: u.valToPos(ciHigh[i],'y',true) }));
			    const loPts = xVals.map((x, i) => ({ x: u.valToPos(x,'x',true), y: u.valToPos(ciLow[i], 'y',true) }));

			    ctx.fillStyle = `rgba(${rv},${gv},${bv},0.1)`;
			    ctx.beginPath();
			    drawSpline(ctx, hiPts, false);
			    drawSpline(ctx, loPts, true);
			    ctx.closePath();
			    ctx.fill();

			    ctx.strokeStyle = `rgba(${rv},${gv},${bv},0.28)`;
			    ctx.lineWidth = 1;
			    ctx.setLineDash([3,4]);
			    [hiPts, loPts].forEach(pts => {
				ctx.beginPath();
				ctx.moveTo(pts[0].x, pts[0].y);
				drawSpline(ctx, pts, false);
				ctx.stroke();
			    });
			    ctx.setLineDash([]);

			    ctx.fillStyle = `rgba(${rv},${gv},${bv},0.9)`;
			    series.points.forEach(p => {
				if (!p.singleton) return;
				const x = u.valToPos(p.speedup,'x',true);
				const y = u.valToPos(p.median, 'y',true);
				ctx.beginPath();
				ctx.moveTo(x, y-7); ctx.lineTo(x-5, y+4); ctx.lineTo(x+5, y+4);
				ctx.closePath(); ctx.fill();
			    });

			    ctx.restore();
			}],
		    },
		    axes: [
			{
			    font: '10px monospace', stroke: '#5a6474',
			    grid: { stroke: '#1a1e25', width: 1 }, ticks: { stroke: '#252a33', width: 1 },
			    label: 'speedup %', labelFont: '10px monospace',
			    values: (u,v) => v.map(x => x == null ? '' : x.toFixed(0)+'%'),
			},
			{
			    font: '10px monospace', stroke: '#5a6474',
			    grid: { stroke: '#1a1e25', width: 1 }, ticks: { stroke: '#252a33', width: 1 },
			    label: 'throughput %', labelFont: '10px monospace',
			    values: (u,v) => v.map(x => x == null ? '' : x.toFixed(0)+'%'),
			    side: 1,
			},
		    ],
		};

		return new uPlot(opts, [xVals, medians, ciLow, ciHigh], chartEl);
	    }

	    // ── Catmull-Rom spline ────────────────────────────────────────────────────────
	    function drawSpline(ctx, points, reverse) {
		const pts = reverse ? [...points].reverse() : points;
		ctx.lineTo(pts[0].x, pts[0].y);
		for (let i = 0; i < pts.length - 1; i++) {
					      const p0 = pts[Math.max(i-1,0)], p1 = pts[i],
					      p2 = pts[i+1],             p3 = pts[Math.min(i+2,pts.length-1)];
					      for (let t = .1; t <= 1; t += .1) {
					      const t2=t*t, t3=t2*t;
					      ctx.lineTo(
					      .5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
					      .5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
					      );
					      }
					      }
					      }

					      // ── Empty / loading ───────────────────────────────────────────────────────────
					      function showEmpty(msg, loading = false) {
					      const emptyEl  = document.getElementById('empty-state');
					      const scrollEl = document.getElementById('charts-scroll');
					      scrollEl.style.display = 'none';
					      emptyEl.classList.remove('hidden');
					      emptyEl.querySelector('.big').style.display = loading ? 'none' : '';
					      document.getElementById('empty-msg').innerHTML =
					      loading ? '<div class="spinner"></div>' : (msg ?? 'no section selected');
							      }

							      // ── Resize ────────────────────────────────────────────────────────────────────
							      window.addEventListener('resize', () => {
								  cardState.forEach((state, card) => {
								      if (!state.plot || !card.classList.contains('expanded')) return;
								      const body = card.querySelector('.ip-chart-body');
								      const w = body.clientWidth - 16;
								      if (w > 0) state.plot.setSize({ width: w, height: CHART_H });
								  });
							      });

	    function esc(s) {
		return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
	    }
	</script>
    </body>
